<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">  
        <style>
            * { 
                box-sizing: border-box; 
            }
            body {
                font: Sans-serif;
                display: flex;
                flex-direction: column;
                background-color: #8fc1e3;
                font-weight: bold;
                color: #f7f9fb;
            }
            h3 {
                text-align: center;
            }
            button {
                border-radius: 50%;
                background-color: #687864;
                color: #f7f9fb;
                font-weight: bold;
                font-size: large;
                width: 35px;
                height: 35px;
                margin: 10px;
            }
            #content-container {
                display: flex; 
                flex-wrap: wrap;
                max-width: 100%;
            }
            @media only screen and (orientation: portrait) {
                #content-container{
                    flex-direction: column;
                }
            }
            .content-block {
                max-width: 100%;
                flex: 1 1 0px;
            }
            .autocomplete {
                /*the container must be positioned relative:*/
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #guess-form {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            input {
                border: 1px solid transparent;
                background-color: #f1f1f1;
                padding: 10px;
                font-size: 16px;
            }
            input[type=text] {
                background-color: #f1f1f1;
                width: 100%;
                border-radius: 5px;
            }
            input[type=submit] {
                background-color: #5085a5;
                color: #f7f9fb;
                border-radius: 5px;
            }
            #taxon-info{
                width: 300px;
                min-height: 500px;
                border-style: solid;
                border-width: 2px;
                border-radius: 5px;
                display: flex;
                overflow: hidden;
                flex-direction: column;
                align-items: center;
                background-color: #687864;
                border-color: #31708e;
            }
            .node{
                border-radius: 5px;
                border-width: 2px;
                border-style: solid;
                border-color: #31708e;
                background-color: #687864;
                padding: 6px;
                margin: 5px;
                cursor: pointer;
                font-size: smaller;
            }
            #canvas{
                position: absolute; 
                width:100%; 
                height: 100%; 
                top: 0px; 
                left: 0px;
                pointer-events: none;
                user-select: none;
                touch-action: none;   
            }
            #tree{
                max-width: 100%;
            }
            .vis-layer{
                margin-bottom: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-wrap: wrap;
            }
            .autocomplete-items {
                position: absolute;
                border: 1px solid #d4d4d4;
                border-bottom: none;
                border-top: none;
                z-index: 99;
                /*position the autocomplete items to be the same width as the container:*/
                top: 100%;
                left: 0;
                right: 0;
            }
            .autocomplete-items div {
                padding: 10px;
                cursor: pointer;
                background-color: #5085a5;
                border-bottom: 1px solid #31708e;
            }
            .autocomplete-items div:hover {
                /*when hovering an item:*/
                background-color: #5a707e;
            }
            .autocomplete-active {
                /*when navigating through the items using the arrow keys:*/
                background-color: #31708e !important;
            }
            .modal {
                display: none; 
                position: fixed; 
                z-index: 1; 
                left: 0;
                top: 0;
                width: 100%;
                height: 100%; 
                overflow: auto; 
                background-color: rgba(0,0,0,0.4); 
            }
            .modal-content {
                background-color: #8fc1e3;
                margin: 20% auto;
                padding: 20px;
                border: 4px solid #31708e;
                border-radius: 5px;
                width: 400px;
                max-width: 80%;
            }
            .close-modal {
                float: right;
                font-size: 28px;
                font-weight: bold;
            }

            .close-modal:hover,
            .close-modal:focus {
                color: #31708e;
                text-decoration: none;
                cursor: pointer;
            }

            #stats{
                display: flex;
            }
            .stat-block{
                display: flex;
                flex-direction: column;
                flex: 1 1 0px;
                margin: 5px;
                padding: 4px;
                background-color: #687864;
                align-items: center;
                text-align: center;
            }
            .stat-block p{
                height: 20px;
            }

        </style>
        <script>
            const unknown_name = "???"
            const guess_limit = 10;

            const vid = "{{ vid }}"
            const today = new Date("{{ today }}")
            const taxon_tree = {{ taxon_tree }};
            const animal_start_index = {{ animal_start_index }};
            const salt = {{ salt }};
            const yesterdays_animal_index = {{ yesterdays_animal_index }};
            const todays_taxons = new Set({{ todays_taxons }});

            const animal_indices = {}
            for (i = animal_start_index; i < taxon_tree.length; i++) {
                taxon_tree[i][0].forEach(name => {
                    animal_indices[name] = i
                });
            }

            class TaxonNode {
                constructor(names, parent = null, is_answer = false) {
                    this.names = names
                    this.parent = parent
                    this.children = []
                    this.is_answer = is_answer
                }

                remove() {
                    if (this.parent)
                        this.parent.children = this.parent.children.filter((child) => {return child != this})
                }

                _add_to_tree(taxon_list, level) {
                    if (level < taxon_list.length){
                        const next = this.children.findIndex((child) => {return child.names[0] === taxon_list[level][0]})
                        if (next == -1) {
                            let node = this
                            for (; level < taxon_list.length; level++){
                                const next_node = new TaxonNode(
                                    taxon_list[level],
                                    node
                                )
                                node.children.push(next_node)
                                node.children.sort()
                                node = next_node 
                            }
                            return node
                        }
                        else
                            return this.children[next]._add_to_tree(taxon_list, level + 1)
                    }
                }

                add_to_tree(taxon_list) {
                    if (taxon_list[0][0] != this.names[0])
                        return false;

                    return this._add_to_tree(taxon_list, 1)
                }
            }

            let _storage;
            let strg = null;
            try {
                _storage = window.localStorage;
                const x = "xyz";
                _storage.setItem(x, x);
                _storage.removeItem(x);
                strg = _storage;
            } catch (e) {
                if ( e instanceof DOMException &&
                     e.name === "QuotaExceededError" &&
                     _storage &&
                     _storage.length !== 0
                    )
                    strg = _storage;
            }
            
            let root = new TaxonNode(taxon_tree[0][0]);
            let unknowns_node = new TaxonNode([unknown_name, unknown_name], root);
            root.children.push(unknowns_node)

            let curr_play_date = new Date(0);
            let curr_guesses = []

            let longest_streak = 0;
            let current_streak = 0;

            let played_games = 0
            let won_games = 0

            if (strg){
                if (strg.getItem("vid") === vid){
                    const curr_play_date_str = strg.getItem("curr_play_date")
                    curr_play_date = new Date(curr_play_date_str)
                    const diff = parseInt((today - curr_play_date)/(24 * 60 * 60 * 1000))
                    if (diff === 0) {
                        const curr_guesses_str = strg.getItem("curr_guesses") || "[]"
                        curr_guesses = JSON.parse(curr_guesses_str)
                    }
                    else {
                        strg.setItem("curr_guesses", "[]")
                        strg.setItem("curr_play_date", today.toISOString().split('T')[0])
                        if (diff > 1) {
                            strg.setItem("current_streak", "0")
                        }
                    }
                }
                else
                    strg.setItem("vid", vid)

                current_streak = parseInt(strg.getItem("current_streak")) || 0
                longest_streak = parseInt(strg.getItem("longest_streak")) || 0
                played_games = parseInt(strg.getItem("played_games")) || 0
                won_games = parseInt(strg.getItem("won_games")) || 0
                
            }

            async function create_hash(message) {
                const msgUint8 = new TextEncoder().encode(message);
                const hashBuffer = await window.crypto.subtle.digest("SHA-512", msgUint8); 
                const output = (new Uint8Array(hashBuffer)).reduce(
                    (s, b) => s + String.fromCharCode(b),
                    ""
                )
                return btoa(output);
            }
            
            var curr_info = null
            async function get_taxon_info(taxon_name){
                if (curr_info != taxon_name){
                    res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(taxon_name)}`)
                    if (res.status === 200){
                        content = await res.json()
                        document.getElementById("info-title").innerText = content["title"]
                        if ("thumbnail" in content)
                            document.getElementById("info-img").src = content["thumbnail"].source
                        else
                            document.getElementById("info-img").src = ""
                        
                        var info = content["extract_html"]
                        var start_index = 0
                        while (true){
                            const index = info.indexOf(".", start_index)
                            if (index > 400 || index == -1)
                                break
                            start_index = index + 1
                        }

                        document.getElementById("info-summary").innerHTML = info.substr(0, start_index)
                        document.getElementById("info-link").setAttribute("href", content["content_urls"]["desktop"]["page"])
                        curr_info = taxon_name
                    }
                }
            }

            function get_animal_taxons(animal){
                let taxons = []
                let i = animal_indices[animal]
                if (i == undefined)
                    return null

                while (i) {
                    const [taxon_names, parent] = taxon_tree[i]
                    taxons.push(taxon_names)
                    i = parent
                }
                taxons.push(taxon_tree[0][0])

                return taxons.reverse()
            }

            async function find_split(guess_taxons) {
                for (let i = 0; i < guess_taxons.length; i++) {
                    const true_name = guess_taxons[i][0];
                    if (!todays_taxons.has(await create_hash(`${i};${salt};${true_name}`)))
                        return i
                }
                return guess_taxons.length
            }

            function draw_line(canvas, parent_node, child_node) {
                if (parent_node && child_node){
                    const NS = "http://www.w3.org/2000/svg";

                    const parent_rect = parent_node.getBoundingClientRect();
                    const child_rect = child_node.getBoundingClientRect();
                    
                    const parent_x = (parent_rect.left + parent_rect.right)/2
                    const parent_y = parent_rect.bottom

                    const child_x= (child_rect.left + child_rect.right)/2
                    const child_y = child_rect.top

                    const line = document.createElementNS(NS,"path")
                    line.setAttribute(
                        "d", 
                        `M ${parent_x}, ${parent_y} C ${parent_x}, ${parent_y + (child_y - parent_y) * 2/3}, ${child_x}, ${parent_y + (child_y - parent_y)/3}, ${child_x}, ${child_y}`
                    )
                    line.style.stroke = "#31708e" 
                    line.style.strokeWidth = "2px" 
                    line.style.fill = "none"
                    canvas.appendChild(line)
                }
            }

            let connection_vis_queue = []
            function create_vis_node(parent_vis, node, vis_level){
                const true_name = node.names[0]
                const display_name = node.names[1]

                const vis_node = document.createElement("div")
                vis_node.innerText = display_name
                vis_node.className = "node"
                if (node.is_answer)
                    vis_node.style.backgroundColor = "green"
                vis_node.onclick = () => {get_taxon_info(true_name)}

                let vis_layer = document.getElementById(`layer_${vis_level}`)
                if (vis_layer === null){
                    vis_layer = document.createElement("div")
                    vis_layer.id = `layer_${vis_level}`
                    vis_layer.className = "vis-layer"
                    document.getElementById("tree").appendChild(vis_layer)
                    vis_layer = document.getElementById(`layer_${vis_level}`)
                }

                vis_layer.appendChild(vis_node)

                connection_vis_queue.push([parent_vis, vis_node])

                return vis_node
            }

            function visualize_node(parent_vis, parent_node, vis_level = 0){
                if (parent_vis != null)
                    while (parent_node.children.length == 1)
                        parent_node = parent_node.children[0]
                
                const vis_node = create_vis_node(parent_vis, parent_node, vis_level)
            
                parent_node.children.forEach(node => {
                    visualize_node(vis_node, node, vis_level + 1)
                });
            }

            function visualize_tree(){
                document.getElementById("tree").innerHTML = '';
                const canvas = document.getElementById("canvas");
                canvas.innerHTML = ''
                connection_vis_queue = []

                visualize_node(null, root)
                connection_vis_queue.forEach(
                    (vis_nodes) => {
                        draw_line(canvas, vis_nodes[0], vis_nodes[1])
                    }
                )
            }

            function game_over(rerun){
                document.getElementById("guess-form").style.pointerEvents = "none";
                document.getElementById("guess-button").style.backgroundColor = "gray";
                document.getElementById("post-game").style.display = "block";
                if (!rerun){
                    played_games++;
                    if (strg){
                        strg.setItem("current_streak", current_streak)
                        strg.setItem("longest_streak", longest_streak)
                        strg.setItem("played_games", played_games)
                        strg.setItem("won_games", won_games)
                    }
                }
                if (strg) {
                    document.getElementById("curr-streak").innerText = current_streak;
                    document.getElementById("long-streak").innerText = longest_streak;
                    document.getElementById("win-count").innerText = won_games;
                    document.getElementById("game-count").innerText = played_games;
                }
                document.getElementById("guess-count").innerText = "Guesses: " + guess_count 
            }
            function win(rerun){
                document.getElementById("status").innerText = "You win!"
                document.getElementById("end-game-status").innerText = "You Win!" 
                if (!rerun){
                    won_games++;
                    current_streak++;
                    if (current_streak > longest_streak)
                        longest_streak = current_streak
                }
                game_over(rerun)

            }

            function lose(rerun){
                document.getElementById("status").innerText = "You lost!"
                document.getElementById("end-game-status").innerText = "You Lost!" 
                game_over(rerun)
            }

            let best_guess = 0
            let closest_taxon_names = root.names
            let guess_count = 0
            async function guess_animal(guess = null, rerun = false){
                if (!guess) {
                    guess = document.getElementById("guess-field").value.trim().toLowerCase()
                    document.getElementById("guess-field").value = ""
                }
                document.getElementById("status").innerText = ""

                const guess_taxons = get_animal_taxons(guess)
                if (!guess_taxons){
                    document.getElementById("status").innerText = "Not an animal"
                    return
                }

                const split_index = await find_split(guess_taxons)
                if (!split_index){
                    document.getElementById("status").innerText = "No shared root"
                    return
                }
                taxon_tree[animal_indices[guess]][0] = []
                guess_count++
                document.getElementById("guess-counter").innerText = "Guesses: " + guess_count + "/" + guess_limit

                var won = false;
                const leaf_node = root.add_to_tree(guess_taxons)
                if (split_index > best_guess){
                    best_guess = split_index
                    closest_taxon_names = guess_taxons[best_guess - 1]
                    if (unknowns_node){
                        unknowns_node.remove()
                        unknowns_node = null
                    }
                    if(best_guess === guess_taxons.length){
                        leaf_node.is_answer = true
                        win(rerun);
                        won = true;
                    }
                    else{
                        let unknowns_taxon = guess_taxons.slice(0, best_guess)
                        unknowns_taxon.push([unknown_name, unknown_name])
                        unknowns_node = root.add_to_tree(unknowns_taxon)
                    }
                }
                if (!rerun)
                    get_taxon_info(closest_taxon_names[0])

                if (guess_count >= guess_limit && !won)
                    lose(rerun)

                if (strg && !rerun) {
                    curr_guesses.push(guess)
                    strg.setItem("curr_guesses", JSON.stringify(curr_guesses))
                }

                visualize_tree()
                return closest_taxon_names[0]
            }
            
            function autocomplete() {
                const inp = document.getElementById("guess-field")
                const list_id = "guess-autocomplete-list"
                var current_focus = -1;
                inp.addEventListener("input", function(e) {
                    var a, b, i, val = this.value;
                    val = val.toLowerCase()
                    const multiword = (val.search(" ") != -1);
                    closeAllLists();
                    if (!val) 
                        return false;

                    current_focus = -1;
                    a = document.createElement("DIV");
                    a.setAttribute("id", list_id);
                    a.setAttribute("class", "autocomplete-items");
                    this.parentNode.appendChild(a);
                    let suggestion_list = []

                    for (i = animal_start_index; i < taxon_tree.length; i++) {
                        const names = taxon_tree[i][0]
                        let best_name = null
                        let best_name_start = null
                        let best_word_index = null
                        for (let j = 0; j < names.length; j++) {
                            const name = names[j];
                            const words = multiword ? [name]: name.split(" ");
                            for (let k = 0; k < words.length; k++) {
                                const index = words[k].search(val)
                                if (index != -1){
                                    if (!best_name || index < best_name_start || (index == best_name_start && k < best_word_index)){
                                        best_name = name
                                        best_name_start = index
                                        best_word_index = k
                                    }
                                }
                            }
                        }
                        if (best_name)
                            suggestion_list.push([best_name_start, best_word_index, best_name, i])
                    }

                    suggestion_list.sort()
                    suggestion_list.forEach(
                        (nsi) => {
                            const name = nsi[2]
                            const i = nsi[3]
                            display_name = taxon_tree[i][0][1]
                            b = document.createElement("DIV");
                            b.innerHTML = display_name
                            if (display_name != name)
                                b.innerHTML += " (" + name + ")"
                            
                            b.innerHTML += "<input type='hidden' value='" + display_name + "'>";
                                b.addEventListener("click", function(e) {
                                inp.value = this.getElementsByTagName("input")[0].value;
                                closeAllLists();
                            });
                            a.appendChild(b);
                        }
                    )
                });
                inp.addEventListener("keydown", function(e) {
                    var el_list = document.getElementById(list_id);
                    if (el_list) 
                        el_list = el_list.getElementsByTagName("div");
                    if (e.keyCode == 40) { //down
                        setActive(el_list, current_focus + 1);
                    } 
                    else if (e.keyCode == 38) { //up
                        setActive(el_list, current_focus - 1);
                    } 
                    else if (e.keyCode == 13) { //enter
                        e.preventDefault();
                        if (current_focus > -1 && el_list.length) 
                            el_list[current_focus].click();
                        else
                            guess_animal()   
                    }
                });
                function setActive(el_list, new_focus) {
                    if (new_focus != current_focus && el_list.length){
                        if (current_focus != -1)
                            el_list[current_focus].classList.remove("autocomplete-active")

                        if (new_focus >= el_list.length) 
                            new_focus = 0;
                        else if (new_focus < 0) 
                            new_focus = (el_list.length - 1);
                        current_focus = new_focus
                        el_list[current_focus].classList.add("autocomplete-active");
                    }
                };
                function closeAllLists(elmnt) {
                    var el_list = document.getElementById(list_id)
                    if (el_list)
                        el_list.remove()
                    current_focus = -1
                }
                document.addEventListener("click", function (e) {
                    closeAllLists(e.target);
                });
            } 

            function close_el(el_id) {
                document.getElementById(el_id).style.display = "none"
            }

            window.onclick = function(event) {
                if (event.target.className == "modal") {
                    close_el(event.target.id)
                }
            } 
        </script>
    </head>
    <body>
        <svg id="canvas"></svg>
        <div style="display: flex;justify-content: center;">
            <button onclick="document.getElementById('help').style.display='block'">?</button>
        </div>
        <div id="content-container">
            <div class="content-block"></div>
            <div class="content-block">
                <form autocomplete="off" id = "guess-form" action="javascript:guess_animal()"> 
                    <div class="autocomplete" style="width:150px;">
                        <input type="text" id="guess-field"/>
                    </div>
                    <input type="submit" id="guess-button" value="Guess"/>
                </form>
                <p id="guess-counter" style="text-align: center;"></p>
                <p id="status" style="height: 30px;text-align: center;">Welcome!</p>
                <div id ="tree">
                </div>
            </div>

            <div class="content-block" style="display: flex; align-items: center;justify-content: center;">
                <div id="taxon-info">
                    <a id="info-link" target="_blank" style="display: flex; align-items: center;justify-content: center; flex-direction: column;">
                        <img id="info-img" style="max-width: 95%; max-height: 300px; margin-top: 10px;"/>
                        <h2 id="info-title" style="margin-bottom: -10px; max-width: 95%; color:#f7f9fb"></h2>
                    </a>
                    <div id="info-summary" style="text-overflow: clip; max-width: 95%;"></div>
                </div>
            </div>
        </div>

        <div class="modal" id="post-game">
            <div class="modal-content">
                <span class="close-modal" onclick="close_el('post-game')">&times;</span>
                <h3 id="end-game-status"></h3>
                <p id="guess-count" style="text-align: center;"></p>
                <div id="stats">
                    <div class="stat-block">
                        <p>Wins</p>
                        <p id="win-count">N/A</p>
                    </div>
                    <div class="stat-block">
                        <p>Games</p>
                        <p id="game-count">N/A</p>
                    </div>
                    <div class="stat-block">
                        <p>Current streak</p>
                        <p id="curr-streak">N/A</p>
                    </div>
                    <div class="stat-block">
                        <p>Longest streak</p>
                        <p id="long-streak">N/A</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal" id="help">
            <div class="modal-content">
                <span class="close-modal" onclick="close_el('help')">&times;</span>
                <h3>How to play</h3>
                <p>
                    Guess an animal
                </p>
            </div>
        </div>
        <script>
            if (curr_guesses.length){
                let closest_taxon;
                curr_guesses.forEach(
                    (guess) => {
                        closest_taxon = guess_animal(guess, true)
                    }
                )
                closest_taxon.then((name) => {get_taxon_info(name)})
                
            }
            else{
                visualize_tree()
                get_taxon_info("animalia")
            }
            autocomplete()

            if (yesterdays_animal_index != -1)
                document.getElementById("status").innerText = "Welcome! Yesterdays animal was " + taxon_tree[i][0][1];
            
        </script>
    </body>
</html>
