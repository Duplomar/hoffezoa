<!DOCTYPE html>
<html>
    <head>
        <style>
            * { 
                box-sizing: border-box; 
            }
            body {
                font: 16px Arial;
            }
            .autocomplete {
                /*the container must be positioned relative:*/
                position: relative;
                display: inline-block;
            }
            input {
                border: 1px solid transparent;
                background-color: #f1f1f1;
                padding: 10px;
                font-size: 16px;
            }
            input[type=text] {
                background-color: #f1f1f1;
                width: 100%;
            }
            input[type=submit] {
                background-color: DodgerBlue;
                color: #fff;
            }
            .autocomplete-items {
                position: absolute;
                border: 1px solid #d4d4d4;
                border-bottom: none;
                border-top: none;
                z-index: 99;
                /*position the autocomplete items to be the same width as the container:*/
                top: 100%;
                left: 0;
                right: 0;
            }
            .autocomplete-items div {
                padding: 10px;
                cursor: pointer;
                background-color: #fff;
                border-bottom: 1px solid #d4d4d4;
            }
            .autocomplete-items div:hover {
                /*when hovering an item:*/
                background-color: #e9e9e9;
            }
            .autocomplete-active {
                /*when navigating through the items using the arrow keys:*/
                background-color: DodgerBlue !important;
                color: #ffffff;
            }

        </style>
        <script>
            class TaxonNode {
                constructor(name) {
                    this.name = name
                    this.children = []
                }

                add_to_tree(taxon_list) {
                    
                }

            }
            const taxon_tree = [
                ["root", 0],
                ["ch_1_a", 0],
                ["ch_1_b", 0],
                ["ch_2_a", 1],
                ["ch_2_b", 1],
                ["and_1", 2],
                ["and_2", 4]
            ];
            const animal_start_index = 5;
            const animal_indices = {}
            for (i = animal_start_index; i < taxon_tree.length; i++) {
                animal_indices[taxon_tree[i][0]] = i
            }
            
            const salt = 5  
            const todays_taxons = new Set([])

            async function get_hash(message) {
                const msgUint8 = new TextEncoder().encode(message);
                const hashBuffer = await window.crypto.subtle.digest("SHA-512", msgUint8); 
                const output = new Uint8Array(hashBuffer).toBase64();
                return output;
            }

            function get_animal_taxons(animal){
                let taxons = []
                let i = animal_indices[animal]

                while (i) {
                    const [taxon, parent] = taxon_tree[i]
                    taxons.push(taxon)
                    i = parent
                }
                taxons.push(taxon_tree[0][0])

                return taxons.reverse()
            }

            async function find_closest_common(guess_taxons) {
                for (let i = 0; i < guess_taxons.length; i++) {
                    const taxon = guess_taxons[i];
                    if (!todays_taxons.has(await get_hash(taxon)))
                        return i - 1
                }
                return guess_taxons.length - 1
            }

            async function guess_animal(){
                const guess = document.getElementById("guess-field").value.trim().toLowerCase()
                document.getElementById("guess-field").value = ""
                document.getElementById("status").innerText = ""

                const guess_taxons = get_animal_taxons(guess)
                const closest_common = await find_closest_common(guess_taxons)
                if (closest_common == -1){
                    document.getElementById("status").innerText = "Not an animal"
                    return
                }

                console.log(guess_taxons)
                console.log(closest_common)

                const new_animal = document.createElement("p")
                new_animal.innerText = guess_taxons[closest_common]
                document.getElementById("tree").appendChild(new_animal)
            }

            
            function autocomplete() {
                const inp = document.getElementById("guess-field")
                var currentFocus;
                inp.addEventListener("input", function(e) {
                    var a, b, i, val = this.value;
                    closeAllLists();
                    if (!val) 
                        return false;

                    currentFocus = -1;
                    a = document.createElement("DIV");
                    a.setAttribute("id", this.id + "autocomplete-list");
                    a.setAttribute("class", "autocomplete-items");
                    this.parentNode.appendChild(a);

                    for (i = animal_start_index; i < taxon_tree.length; i++) {
                        const item = taxon_tree[i][0];
                        if (item.substr(0, val.length).toUpperCase() == val.toUpperCase()) {
                            b = document.createElement("DIV");
                            b.innerHTML = "<strong>" + item.substr(0, val.length) + "</strong>";
                            b.innerHTML += item.substr(val.length);
                            b.innerHTML += "<input type='hidden' value='" + item + "'>";
                                b.addEventListener("click", function(e) {
                                inp.value = this.getElementsByTagName("input")[0].value;
                                closeAllLists();
                            });
                            a.appendChild(b);
                        }
                    }
                });
                inp.addEventListener("keydown", function(e) {
                    var x = document.getElementById(this.id + "autocomplete-list");
                    if (x) x = x.getElementsByTagName("div");
                    if (e.keyCode == 40) { //down
                        currentFocus++;
                        addActive(x);
                    } else if (e.keyCode == 38) { //up
                        currentFocus--;
                        addActive(x);
                    } else if (e.keyCode == 13) { //enter
                        e.preventDefault();
                        if (currentFocus > -1) {
                        if (x) x[currentFocus].click();
                        }
                    }
                });
                function addActive(x) {
                    if (!x) 
                        return false;
                    removeActive(x);

                    if (currentFocus >= x.length) 
                        currentFocus = 0;

                    if (currentFocus < 0) 
                        currentFocus = (x.length - 1);

                    x[currentFocus].classList.add("autocomplete-active");
                }
                function removeActive(x) {
                    for (var i = 0; i < x.length; i++) {
                    x[i].classList.remove("autocomplete-active");
                    }
                }
                function closeAllLists(elmnt) {
                    var x = document.getElementsByClassName("autocomplete-items");
                    for (var i = 0; i < x.length; i++) {
                    if (elmnt != x[i] && elmnt != inp) {
                    x[i].parentNode.removeChild(x[i]);
                    }
                }
                }
                document.addEventListener("click", function (e) {
                    closeAllLists(e.target);
                });
             } 

        </script>
    </head>
    <body>
        <p id="status"></p>
        <form autocomplete="off" action="javascript:guess_animal()"> 
             <div class="autocomplete" style="width:300px;">
                <input type="text" id="guess-field"></input>
            </div>
            <input type="submit">
        </form>
        <div id="tree">
        </div>

        <script>
             autocomplete();
        </script>
    </body>
</html>
