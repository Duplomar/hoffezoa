<!DOCTYPE html>
<html>
    <head>
        <style>
            * { 
                box-sizing: border-box; 
            }
            body {
                font: 16px Sans-serif;
                display: flex;
                flex-direction: column;
                background-color: #8fc1e3;
                font-weight: bold;
                color: #f7f9fb;
            }
            h3 {
                text-align: center;
            }
            .autocomplete {
                /*the container must be positioned relative:*/
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #guess-form {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            input {
                border: 1px solid transparent;
                background-color: #f1f1f1;
                padding: 10px;
                font-size: 16px;
            }
            input[type=text] {
                background-color: #f1f1f1;
                width: 100%;
                border-radius: 5px;
            }
            input[type=submit] {
                background-color: #5085a5;
                color: #f7f9fb;
                border-radius: 5px;
            }
            #taxon-info{
                width: 300px;
                min-height: 500px;
                border-style: solid;
                border-width: 2px;
                border-radius: 5px;
                display: flex;
                overflow: hidden;
                flex-direction: column;
                align-items: center;
                background-color: #687864;
                border-color: #31708e;
            }
            .node{
                border-radius: 5px;
                border-width: 2px;
                border-style: solid;
                border-color: #31708e;
                background-color: #687864;
                padding: 10px;
                margin: 5px;
                cursor: pointer;
            }
            .vis-layer{
                margin-bottom: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .autocomplete-items {
                position: absolute;
                border: 1px solid #d4d4d4;
                border-bottom: none;
                border-top: none;
                z-index: 99;
                /*position the autocomplete items to be the same width as the container:*/
                top: 100%;
                left: 0;
                right: 0;
            }
            .autocomplete-items div {
                padding: 10px;
                cursor: pointer;
                background-color: #5085a5;
                border-bottom: 1px solid #31708e;
            }
            .autocomplete-items div:hover {
                /*when hovering an item:*/
                background-color: #5a707e;
            }
            .autocomplete-active {
                /*when navigating through the items using the arrow keys:*/
                background-color: #31708e !important;
            }
            .modal {
                display: none; 
                position: fixed; 
                z-index: 1; 
                left: 0;
                top: 0;
                width: 100%;
                height: 100%; 
                overflow: auto; 
                background-color: rgba(0,0,0,0.4); 
            }
            .modal-content {
                background-color: #8fc1e3;
                margin: 20% auto;
                padding: 20px;
                border: 4px solid #31708e;
                border-radius: 5px;
                width: 400px
            }
            #close-modal {
                float: right;
                font-size: 28px;
                font-weight: bold;
            }

            #close-modal:hover,
            #close-modal:focus {
                color: #31708e;
                text-decoration: none;
                cursor: pointer;
            }

        </style>
        <script>
            const unknown_name = "???"
            const guess_limit = 10;
            const today = new Date()
            
            const taxon_tree = {{ taxon_tree }};
            const animal_start_index = {{ animal_start_index }};
            const salt = {{ salt }};
            const yesterdays_animal_index = {{ yesterdays_animal_index }};
            const todays_taxons = new Set({{ todays_taxons }});

            const animal_indices = {}
            for (i = animal_start_index; i < taxon_tree.length; i++) {
                taxon_tree[i][0].forEach(name => {
                    animal_indices[name] = i
                });
            }

            class TaxonNode {
                constructor(names, parent = null) {
                    this.names = names
                    this.parent = parent
                    this.children = []
                }

                to_str(){
                    let child_s = []
                    this.children.forEach(
                        (child) => {
                            child_s.push(child.to_str())
                        }
                    )
                    return `{"n":["${this.names.join('","')}"],"c": [${child_s.join(",")}]}`
                }
                
                static _from_json(taxon_tree_json, parent){
                    let new_node = new TaxonNode(taxon_tree_json["n"], parent)
                    taxon_tree_json["c"].forEach(
                        (child) => {
                            new_node.children.push(TaxonNode._from_json(child, new_node))
                        }
                    )
                    return new_node
                }

                static from_str(taxon_tree_str){
                    return TaxonNode._from_json(JSON.parse(taxon_tree_str), null)
                }
                
                print(indent = "") {
                    console.log(indent + this.names)
                    this.children.forEach((child) => {child.print(indent + " ")})
                }

                remove() {
                    if (this.parent)
                        this.parent.children = this.parent.children.filter((child) => {return child != this})
                }

                _add_to_tree(taxon_list, level) {
                    if (level < taxon_list.length){
                        const next = this.children.findIndex((child) => {return child.names[0] === taxon_list[level][0]})
                        if (next == -1) {
                            let node = this
                            for (; level < taxon_list.length; level++){
                                const next_node = new TaxonNode(
                                    taxon_list[level],
                                    node
                                )
                                node.children.push(next_node)
                                node.children.sort()
                                node = next_node 
                            }
                            return node
                        }
                        else
                            return this.children[next]._add_to_tree(taxon_list, level + 1)
                    }
                }

                add_to_tree(taxon_list) {
                    if (taxon_list[0][0] != this.names[0])
                        return false;

                    return this._add_to_tree(taxon_list, 1)
                }
            }

            let _storage;
            let strg = null;
            try {
                _storage = window.localStorage;
                const x = "xyz";
                _storage.setItem(x, x);
                _storage.removeItem(x);
                strg = _storage;
            } catch (e) {
                if ( e instanceof DOMException &&
                     e.name === "QuotaExceededError" &&
                     _storage &&
                     _storage.length !== 0
                    )
                    strg = _storage;
            }
            
            let root = new TaxonNode(taxon_tree[0][0]);
            let unknowns_node = new TaxonNode([unknown_name, unknown_name], root);
            root.children.push(unknowns_node)

            let first_play = today;
            let history = [];
            let longest_streak = 0;
            let current_streak = 0;

            if (strg){
                const first_play_str = strg.getItem("first_play")
                if (first_play_str){
                    first_play = new Date(first_play_str)
                    const history_str = strg.getItem("history")
                    if (history_str){
                        let _streak = 0
                        for (let i = 0; i < history_str.length; i++){
                            const score = history_str.charCodeAt(i) - 98
                            history.push(score)
                            if (score > 0)
                                _streak++
                            else
                                _streak = 0
                            if (_streak > longest_streak)
                                longest_streak = _streak
                        }

                        days_diff = (today - first_play)/86400000
                        for (let i = 0; i < days_diff.length; i++)
                            history.push(0)
                    }
                }

            }

            async function create_hash(message) {
                const msgUint8 = new TextEncoder().encode(message);
                const hashBuffer = await window.crypto.subtle.digest("SHA-512", msgUint8); 
                const output = new Uint8Array(hashBuffer).toBase64();
                return output;
            }
            
            var curr_info = null
            async function get_taxon_info(taxon_name){
                if (curr_info != taxon_name){
                    res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(taxon_name)}`)
                    if (res.status === 200){
                        content = await res.json()
                        console.log(content)
                        document.getElementById("info-title").innerText = content["title"]
                        if ("thumbnail" in content)
                            document.getElementById("info-img").src = content["thumbnail"].source
                        else
                            document.getElementById("info-img").src = ""
                        
                        var info = content["extract_html"]
                        var start_index = 0
                        while (true){
                            const index = info.indexOf(".", start_index)
                            if (index > 400 || index == -1)
                                break
                            start_index = index + 1
                        }

                        document.getElementById("info-summary").innerHTML = info.substr(0, start_index)
                        document.getElementById("info-link").setAttribute("href", content["content_urls"]["desktop"]["page"])
                        curr_info = taxon_name
                    }
                }
            }

            function get_animal_taxons(animal){
                let taxons = []
                let i = animal_indices[animal]
                if (i == undefined)
                    return null

                while (i) {
                    const [taxon_names, parent] = taxon_tree[i]
                    taxons.push(taxon_names)
                    i = parent
                }
                taxons.push(taxon_tree[0][0])

                return taxons.reverse()
            }

            async function find_split(guess_taxons) {
                for (let i = 0; i < guess_taxons.length; i++) {
                    const true_name = guess_taxons[i][0];
                    if (!todays_taxons.has(await create_hash(`${i};${salt};${true_name}`)))
                        return i
                }
                return guess_taxons.length
            }

            function draw_line(parent_node, child_node) {
                if (parent_node && child_node){
                    const NS = "http://www.w3.org/2000/svg";
                    const canvas = document.createElementNS(NS, "svg")

                    const parent_rect = parent_node.getBoundingClientRect();
                    const child_rect = child_node.getBoundingClientRect();
                    
                    const parent_x_center = (parent_rect.left + parent_rect.right)/2
                    const child_x_center = (child_rect.left + child_rect.right)/2

                    let left;
                    let right;
                    const parent_right =  child_x_center < parent_x_center;
                    if (parent_right){                      
                        left = child_x_center
                        right = parent_x_center
                    }
                    else{
                        left = parent_x_center
                        right = child_x_center
                    }
                    const width = right - left
                    const height = child_rect.top - parent_rect.bottom

                    canvas.style.width = width + 1 + "px";
                    canvas.style.height = height + "px";
                    canvas.style.left = left - 1 + "px"
                    canvas.style.top = parent_rect.bottom + "px"
                    canvas.style.position = "absolute"

                    const line = document.createElementNS(NS,"path")
                    const parent_line_x = parent_right ? width : 0
                    const child_line_x = parent_right ? 0: width
                    line.setAttribute("d", `M ${parent_line_x}, 0 C ${parent_line_x}, ${height * 2/3}, ${child_line_x}, ${height/3}, ${child_line_x}, ${height}`)
                    line.style.stroke = "#31708e" 
                    line.style.strokeWidth = "2px" 
                    line.style.fill = "none"
                    canvas.appendChild(line)
                    
                    document.getElementById("tree").appendChild(canvas)
                }
            }

            let connection_vis_queue = []
            function create_vis_node(parent_vis, names, vis_level){
                const true_name = names[0]
                const display_name = names[1]

                const vis_node = document.createElement("div")
                vis_node.innerText = display_name
                vis_node.className = "node"
                vis_node.onclick = () => {get_taxon_info(true_name)}

                let vis_layer = document.getElementById(`layer_${vis_level}`)
                if (vis_layer === null){
                    vis_layer = document.createElement("div")
                    vis_layer.id = `layer_${vis_level}`
                    vis_layer.className = "vis-layer"
                    document.getElementById("tree").appendChild(vis_layer)
                    vis_layer = document.getElementById(`layer_${vis_level}`)
                }

                vis_layer.appendChild(vis_node)

                connection_vis_queue.push([parent_vis, vis_node])

                return vis_node
            }

            function visualize_node(parent_vis, parent_node, vis_level = 0){
                if (parent_vis != null)
                    while (parent_node.children.length == 1)
                        parent_node = parent_node.children[0]
                
                const vis_node = create_vis_node(parent_vis, parent_node.names, vis_level)
                
                parent_node.children.forEach(node => {
                    visualize_node(vis_node, node, vis_level + 1)
                });
            }

            function visualize_tree(){
                document.getElementById("tree").innerHTML = '';
                connection_vis_queue = []

                visualize_node(null, root)
                connection_vis_queue.forEach(
                    (vis_nodes) => {
                        draw_line(vis_nodes[0], vis_nodes[1])
                    }
                )
            }

            function disable_game(){
                document.getElementById("guess-form").style.pointerEvents = "none";
                document.getElementById("guess-button").style.backgroundColor = "gray";
                document.getElementById("post-game").style.display = "block";
            }
            function win(){
                disable_game()
                document.getElementById("status").innerText = "You win!!"

            }

            function lose(){
                disable_game()
                document.getElementById("status").innerText = "You lose!!"
            }

            let best_guess = 0
            let closest_taxon_names = root.names
            let guess_count = 0
            async function guess_animal(){
                const guess = document.getElementById("guess-field").value.trim().toLowerCase()
                document.getElementById("guess-field").value = ""
                document.getElementById("status").innerText = ""

                const guess_taxons = get_animal_taxons(guess)
                if (!guess_taxons){
                    document.getElementById("status").innerText = "Not an animal"
                    return
                }

                const split_index = await find_split(guess_taxons)
                if (!split_index){
                    document.getElementById("status").innerText = "No shared root"
                    return
                }
                taxon_tree[animal_indices[guess]][0] = []
                guess_count++
                document.getElementById("guess-counter").innerText = "Guesses: " + guess_count + "/" + guess_limit

                var won = false;
                root.add_to_tree(guess_taxons)
                if (split_index > best_guess){
                    best_guess = split_index
                    closest_taxon_names = guess_taxons[best_guess - 1]
                    if (unknowns_node){
                        unknowns_node.remove()
                        unknowns_node = null
                    }
                    if(best_guess === guess_taxons.length){
                        win();
                        won = true;
                    }
                    else{
                        let unknowns_taxon = guess_taxons.slice(0, best_guess)
                        unknowns_taxon.push([unknown_name, unknown_name])
                        unknowns_node = root.add_to_tree(unknowns_taxon)
                    }
                }
                p = get_taxon_info(closest_taxon_names[0])
                if (guess_count >= guess_limit && !won)
                    lose()

                if (strg)
                    strg.setItem("curr_tree", root.to_str())

                visualize_tree()
                await p
            }
            
            function autocomplete() {
                const inp = document.getElementById("guess-field")
                const list_id = "guess-autocomplete-list"
                var current_focus = -1;
                inp.addEventListener("input", function(e) {
                    var a, b, i, val = this.value;
                    val = val.toLowerCase()
                    closeAllLists();
                    if (!val) 
                        return false;

                    current_focus = -1;
                    a = document.createElement("DIV");
                    a.setAttribute("id", list_id);
                    a.setAttribute("class", "autocomplete-items");
                    this.parentNode.appendChild(a);

                    for (i = animal_start_index; i < taxon_tree.length; i++) {
                        var relevant_name = null
                        var relevant_index = null
                        taxon_tree[i][0].forEach((name) => {
                            const index = name.search(val)
                            if (index != -1){
                                relevant_name = name
                                relevant_index = index
                            }
                        })
                        if (relevant_name) {
                            display_name = taxon_tree[i][0][1]
                            b = document.createElement("DIV");
                            b.innerHTML = display_name
                            if (display_name != relevant_name)
                                b.innerHTML += " (" + relevant_name + ")"
                            
                            b.innerHTML += "<input type='hidden' value='" + display_name + "'>";
                                b.addEventListener("click", function(e) {
                                inp.value = this.getElementsByTagName("input")[0].value;
                                closeAllLists();
                            });
                            a.appendChild(b);
                        }
                    }
                });
                inp.addEventListener("keydown", function(e) {
                    var el_list = document.getElementById(list_id);
                    if (el_list) 
                        el_list = el_list.getElementsByTagName("div");
                    if (e.keyCode == 40) { //down
                        setActive(el_list, current_focus + 1);
                    } 
                    else if (e.keyCode == 38) { //up
                        setActive(el_list, current_focus - 1);
                    } 
                    else if (e.keyCode == 13) { //enter
                        e.preventDefault();
                        if (current_focus > -1 && el_list.length) 
                            el_list[current_focus].click();
                        else
                            guess_animal()   
                    }
                });
                function setActive(el_list, new_focus) {
                    if (new_focus != current_focus && el_list.length){
                        if (current_focus != -1)
                            el_list[current_focus].classList.remove("autocomplete-active")

                        if (new_focus >= el_list.length) 
                            new_focus = 0;
                        else if (new_focus < 0) 
                            new_focus = (el_list.length - 1);
                        current_focus = new_focus
                        el_list[current_focus].classList.add("autocomplete-active");
                    }
                };
                function closeAllLists(elmnt) {
                    var el_list = document.getElementById(list_id)
                    if (el_list)
                        el_list.remove()
                    current_focus = -1
                }
                document.addEventListener("click", function (e) {
                    closeAllLists(e.target);
                });
            } 

            function close_el(el_id) {
                document.getElementById(el_id).style.display = "none"
            }

            window.onclick = function(event) {
                if (event.target.className == "modal") {
                    close_el(event.target.id)
                }
            } 
        </script>
    </head>
    <body>
        <div>
            <button onclick="document.getElementById('help').style.display='block'">?</button>
        </div>
        <div style="display: flex; flex-wrap: wrap;">
            <div style="flex: 1 1 0px; min-width: 400px"></div>
            <div style="flex: 1 1 0px; min-width: 400px;">
                <form autocomplete="off" id = "guess-form" action="javascript:guess_animal()"> 
                    <div class="autocomplete" style="width:150px;">
                        <input type="text" id="guess-field"></input>
                    </div>
                    <input type="submit" id="guess-button" value="Guess"/>
                    <p id="guess-counter" style="margin-left: 10px;"></p>
                </form>
                <p id="status" style="height: 30px;text-align: center;"></p>
                <div id ="tree">
                </div>
            </div>

            <div style="display: flex; flex: 1 1 0px;min-width: 400px; align-items: center;justify-content: center;">
                <div id="taxon-info">
                    <a id="info-link" target="_blank" style="display: flex; align-items: center;justify-content: center; flex-direction: column;">
                        <img id="info-img" style="max-width: 95%; max-height: 300px; margin-top: 10px;"/>
                        <h2 id="info-title" style="margin-bottom: -10px; max-width: 95%; color:#f7f9fb"></h2>
                    </a>
                    <div id="info-summary" style="text-overflow: clip; max-width: 95%;"></div>
                </div>
            </div>
        </div>

        <div class="modal" id="post-game">
            <div class="modal-content">
                <span class="close-modal" onclick="close_el('post-game')">&times;</span>
                <div id="stats">
                    <div class="stat-block">
                        <p>Guesses</p>
                        <p id="final-guesses">0</p>
                    </div>
                    <div class="stat-block">
                        <p>Current streak</p>
                        <p id="curr-streak">0</p>
                    </div>
                    <div class="stat-block">
                        <p>Longest streak</p>
                        <p id="long-streak">0</p>
                    </div>
                </div>
                <h3>History</h3>
                <div id="history">
                    
                </div>
            </div>
        </div>
        <div class="modal" id="help">
            <div class="modal-content">
                <span class="close-modal" onclick="close_el('help')">&times;</span>
                <h3>How to play</h3>
                <p>
                    Guess an animal
                </p>
            </div>
        </div>
        <script>
            visualize_tree()
            autocomplete();
            get_taxon_info("animalia")
        </script>
    </body>
</html>
